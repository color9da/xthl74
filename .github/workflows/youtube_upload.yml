name: YouTube Shorts Upload

on:
  schedule:
    - cron: '0 14 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-youtube-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automation pipeline
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_FOLDER: /luzara ross
          LOCAL_INPUT_DIR: Videos
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          AI_MODEL: openai
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Starting YouTube upload pipeline..."
          python auto_pipeline.py
          echo "Pipeline complete"

      - name: Commit published videos log
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add published_videos.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Update published videos [skip ci]"
            git pull --rebase
            git push
            echo "Committed"
          else
            echo "No changes"
          fi
